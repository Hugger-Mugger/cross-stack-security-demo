version: "3.9"
services:
  postgres-prod:
    image: postgres:15
    container_name: demo-postgres-prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: demo_prod
    ports:
      - "5434:5432"
    volumes:
      - ./db/setup-prod.sql:/docker-entrypoint-initdb.d/setup.sql
